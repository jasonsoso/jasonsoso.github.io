  <footer>
        <div class="container">
            <div class="footer-content">
                <ul class="list-inline social-buttons">
                    {% for network in site.social %}
                    <li><a href="{{ network.url }}" target="_blank"><i class="fa fa-{{ network.title }}"></i></a></li>
                    {% endfor %}
                </ul>
                <p class="copyright">Copyright &copy; {{ site.title }} 2015-{{ site.time | date: '%Y' }}</p>
                {% if site.beian.number %}
                <p class="beian"><a href="{{ site.beian.url }}" target="_blank" rel="noopener">{{ site.beian.number }}</a></p>
                {% endif %}
            </div>
        </div>
    </footer>
